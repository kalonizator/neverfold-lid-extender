name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build Universal Binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create PKG Installer
        run: |
          # Setup package root structure
          mkdir -p pkgroot/usr/local/bin
          cp .build/apple/Products/Release/neverfold-lid-extender pkgroot/usr/local/bin/
          chmod +x pkgroot/usr/local/bin/neverfold-lid-extender
          
          # Setup scripts
          mkdir -p scripts
          
          # Preinstall: Stop and remove any existing daemon
          cat << 'EOF' > scripts/preinstall
          #!/bin/bash
          /usr/local/bin/neverfold-lid-extender uninstall || true
          exit 0
          EOF
          chmod +x scripts/preinstall
          
          # Postinstall: Install and load the daemon
          cat << 'EOF' > scripts/postinstall
          #!/bin/bash
          /usr/local/bin/neverfold-lid-extender install
          exit 0
          EOF
          chmod +x scripts/postinstall
          
          # Build PKG
          pkgbuild --root pkgroot \
                   --scripts scripts \
                   --identifier kz.kzai.neverfold.extender \
                   --version "${{ steps.version.outputs.VERSION }}" \
                   neverfold-lid-extender.pkg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NeverFold Lid Extender ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Installation
            
            Download and run the **`neverfold-lid-extender.pkg`** installer.
            
            Alternatively, install directly from the **NeverFold** app.
          files: neverfold-lid-extender.pkg
          draft: false
          prerelease: false
